name: Generate TikTok Video V20

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Nom exact du produit"
        required: true
      current_price:
        description: "Prix actuel"
        required: false
      original_price:
        description: "Ancien prix"
        required: false
      discount:
        description: "Réduction"
        required: false
      image_url:
        description: "URL de l'image produit"
        required: false
      affiliate_url:
        description: "Lien affilié Amazon"
        required: true
      telegram_url:
        description: "Lien public Telegram, ex. https://t.me/AlerteBonPlan"
        required: false
      deal_temperature:
        description: "Température Dealabs éventuelle, ex. 350"
        required: false

  repository_dispatch:
    types:
      - generate_tiktok

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DEAL_TITLE: ${{ github.event.client_payload.title || inputs.title }}
      CURRENT_PRICE: ${{ github.event.client_payload.currentPrice || inputs.current_price }}
      ORIGINAL_PRICE: ${{ github.event.client_payload.originalPrice || inputs.original_price }}
      DISCOUNT: ${{ github.event.client_payload.discount || inputs.discount }}
      IMAGE_URL: ${{ github.event.client_payload.imageUrl || inputs.image_url }}
      AFFILIATE_URL: ${{ github.event.client_payload.affiliateUrl || inputs.affiliate_url }}
      TELEGRAM_PUBLIC_URL: ${{ github.event.client_payload.telegramUrl || vars.TELEGRAM_PUBLIC_URL || inputs.telegram_url }}
      DEAL_TEMPERATURE: ${{ github.event.client_payload.temperature || github.event.client_payload.dealTemperature || inputs.deal_temperature }}
      TTS_VOICE: fr-FR-HenriNeural
      TTS_RATE: "-5%"
      TTS_PITCH: "-2Hz"

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          python -m pip install --upgrade pip
          python -m pip install edge-tts==7.2.8 "qrcode[pil]==8.2"
          sudo apt-get update
          sudo apt-get install -y ffmpeg



      - name: Sélectionner les offres intéressantes
        id: eligibility
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const title = String(process.env.DEAL_TITLE || '').trim();
          const normalizedTitle = title
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase();

          const rawDiscount = process.env.DISCOUNT || '';
          const currentRaw = process.env.CURRENT_PRICE || '';
          const originalRaw = process.env.ORIGINAL_PRICE || '';

          const parseNumber = (value) => {
            const normalized = String(value)
              .replace(/\s/g, '')
              .replace(/[€$£]/g, '')
              .replace(',', '.')
              .replace(/[^\d.-]/g, '');

            const number = Number(normalized);
            return Number.isFinite(number) ? number : null;
          };

          const explicitMatch = rawDiscount.match(/-?\s*(\d{1,3}(?:[.,]\d+)?)/);
          let discount = explicitMatch
            ? Number(explicitMatch[1].replace(',', '.'))
            : null;

          if (discount === null) {
            const current = parseNumber(currentRaw);
            const original = parseNumber(originalRaw);

            if (
              current !== null &&
              original !== null &&
              original > 0 &&
              current >= 0 &&
              current < original
            ) {
              discount = ((original - current) / original) * 100;
            }
          }

          const categories = [
            {
              name: 'Gaming et informatique',
              keywords: [
                'rtx', 'geforce', 'radeon', 'rx 6', 'rx 7', 'rx 8', 'ryzen',
                'intel core', 'core ultra', 'ssd', 'nvme', 'disque dur',
                'pc gamer', 'ordinateur portable', 'laptop', 'chromebook',
                'ecran gaming', 'moniteur', 'clavier mecanique',
                'souris gaming', 'casque gaming', 'playstation', 'ps5',
                'xbox', 'nintendo switch', 'steam deck', 'rog ally',
                'legion go', 'carte graphique', 'processeur', 'ram ddr',
                'ddr4', 'ddr5', 'wifi 6', 'wifi 7', 'routeur', 'nas',
                'webcam', 'microphone usb', 'elgato', 'logitech g',
                'corsair', 'steelseries', 'razer', 'hyperx', 'asus rog',
                'msi gaming', 'gigabyte', 'crucial', 'kingston', 'samsung 990',
                'wd black', 'western digital'
              ],
              patterns: [
                /\brtx\s*\d{4}\b/,
                /\brx\s*\d{4}\s*(xt|gre)?\b/,
                /\bryzen\s*[3579]\s*\d{4,5}[a-z0-9]*\b/,
                /\bcore\s*(ultra\s*)?[3579]\s*\d{3,5}[a-z0-9-]*\b/,
                /\b\d+(go|gb|to|tb)\s*(ssd|nvme)\b/
              ]
            },
            {
              name: 'Smartphones et objets connectés',
              keywords: [
                'iphone', 'samsung galaxy', 'google pixel', 'smartphone',
                'telephone', 'xiaomi', 'redmi', 'poco', 'oneplus', 'honor',
                'nothing phone', 'motorola', 'oppo', 'realme', 'apple watch',
                'galaxy watch', 'pixel watch', 'montre connectee', 'airpods',
                'buds', 'ecouteurs', 'casque bluetooth', 'enceinte bluetooth',
                'tablette', 'ipad', 'galaxy tab', 'kindle', 'liseuse',
                'garmin', 'fitbit', 'anker', 'soundcore'
              ],
              patterns: [
                /\biphone\s*\d{1,2}\b/,
                /\bgalaxy\s*[asz]\d{1,3}\b/,
                /\bpixel\s*\d{1,2}[a-z]?\b/
              ]
            },
            {
              name: 'TV, image et audio',
              keywords: [
                'televiseur', 'smart tv', 'television', 'oled', 'qled',
                'mini led', 'miniled', 'qd-oled', 'qd mini led',
                'videoprojecteur', 'video projecteur', 'barre de son',
                'home cinema', 'soundbar', 'amplificateur', 'enceinte jbl',
                'enceinte bose', 'sony bravia', 'samsung neo qled',
                'lg oled', 'tcl', 'hisense', 'philips ambilight'
              ],
              patterns: [
                /\b\d{2,3}\s*(pouces|")\b/,
                /\b(4k|8k)\b.*\b(tv|oled|qled|led)\b/
              ]
            },
            {
              name: 'Maison et électroménager',
              keywords: [
                'air fryer', 'friteuse sans huile', 'robot aspirateur',
                'aspirateur balai', 'aspirateur robot', 'aspirateur laveur',
                'dyson', 'roborock', 'dreame', 'ecovacs', 'irobot',
                'ninja', 'kitchenaid', 'thermomix', 'moulinex', 'magimix',
                'machine a cafe', 'cafe grain', 'delonghi', 'nespresso',
                'philips airfryer', 'robot cuisine', 'cookeo',
                'lave linge', 'seche linge', 'lave vaisselle',
                'refrigerateur', 'congelateur', 'climatiseur',
                'ventilateur', 'purificateur d air', 'humidificateur',
                'centrale vapeur', 'defroisseur', 'fer a repasser'
              ],
              patterns: []
            },
            {
              name: 'Bricolage et jardin',
              keywords: [
                'bosch professional', 'bosch vert', 'makita', 'dewalt',
                'milwaukee', 'parkside', 'einhell', 'ryobi', 'facom',
                'perceuse', 'visseuse', 'perforateur', 'meuleuse',
                'scie circulaire', 'scie sauteuse', 'tondeuse',
                'tronconneuse', 'taille haie', 'nettoyeur haute pression',
                'karcher', 'barbecue', 'plancha', 'weber', 'campingaz'
              ],
              patterns: []
            },
            {
              name: 'Jouets et culture populaire',
              keywords: [
                'lego', 'playmobil', 'pokemon', 'nintendo', 'marvel',
                'star wars', 'harry potter', 'funko pop', 'jeu de societe',
                'hot wheels', 'barbie', 'nerf', 'disney', 'playstation 5',
                'manette dualsense', 'carte pokemon'
              ],
              patterns: [
                /\blego\s*\d{4,6}\b/
              ]
            },
            {
              name: 'Beauté et premium',
              keywords: [
                'parfum', 'eau de parfum', 'coffret parfum', 'lisseur',
                'seche cheveux', 'airwrap', 'oral-b', 'brosse a dents electrique',
                'tondeuse barbe', 'rasoir electrique', 'philips oneblade',
                'braun series', 'ghd', 'babyliss', 'remington'
              ],
              patterns: []
            },
            {
              name: 'Auto et mobilité',
              keywords: [
                'dashcam', 'carplay', 'android auto', 'chargeur voiture',
                'compresseur voiture', 'trottinette electrique',
                'velo electrique', 'gps garmin', 'gps tomtom',
                'batterie externe', 'booster batterie', 'camera recul'
              ],
              patterns: []
            }
          ];

          const popularBrands = [
            'apple', 'samsung', 'sony', 'lg', 'philips', 'jbl', 'bose',
            'logitech', 'corsair', 'razer', 'steelseries', 'asus', 'msi',
            'gigabyte', 'lenovo', 'hp', 'dell', 'acer', 'tcl', 'hisense',
            'xiaomi', 'dyson', 'ninja', 'roborock', 'dreame', 'delonghi',
            'karcher', 'bosch', 'makita', 'dewalt', 'milwaukee', 'lego',
            'nintendo', 'playstation', 'xbox', 'garmin', 'anker', 'oral-b',
            'braun', 'ghd', 'kitchenaid', 'moulinex', 'weber'
          ];

          const matchedCategories = categories
            .filter((category) =>
              category.keywords.some((keyword) => normalizedTitle.includes(keyword)) ||
              category.patterns.some((pattern) => pattern.test(normalizedTitle))
            )
            .map((category) => category.name);

          const matchedBrands = popularBrands.filter((brand) =>
            normalizedTitle.includes(brand)
          );

          const isInteresting =
            matchedCategories.length > 0 ||
            matchedBrands.length > 0;

          const rawTemperature = String(process.env.DEAL_TEMPERATURE || '');
          const temperatureMatch = rawTemperature.match(/-?\d+(?:[.,]\d+)?/);
          const dealTemperature = temperatureMatch
            ? Number(temperatureMatch[0].replace(',', '.'))
            : null;

          const isVeryHotDeal =
            dealTemperature !== null &&
            dealTemperature >= 300;

          let eligible = false;
          let reason = '';

          /*
           * Nouvelles règles :
           * - article dans une catégorie intéressante : vidéo à chaque fois,
           *   même avec une petite réduction ou un pourcentage absent ;
           * - article non prioritaire : vidéo uniquement à partir de 40 %.
           */
          if (isVeryHotDeal) {
            eligible = true;
            reason = `offre Dealabs très chaude (${dealTemperature.toFixed(0)}°)`;
          } else if (isInteresting) {
            eligible = true;
            const labels = [...matchedCategories, ...matchedBrands.map((brand) => `marque ${brand}`)];
            reason = discount === null
              ? `article populaire (${labels.join(', ')})`
              : `article populaire (${labels.join(', ')}) avec ${discount.toFixed(2)} % de réduction`;
          } else if (discount !== null && discount >= 40) {
            eligible = true;
            reason = `article non prioritaire mais forte réduction de ${discount.toFixed(2)} %`;
          } else if (discount === null) {
            reason = 'article non prioritaire et pourcentage de réduction introuvable';
          } else {
            reason = `article non prioritaire avec seulement ${discount.toFixed(2)} % de réduction`;
          }

          const normalizedDiscount = discount === null
            ? ''
            : `-${Math.round(discount)}%`;

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `eligible=${eligible}`,
              `discount_value=${discount === null ? '' : discount.toFixed(2)}`,
              `normalized_discount=${normalizedDiscount}`,
              `interesting=${isInteresting}`,
              `category=${matchedCategories.join(' / ')}`,
              `brands=${matchedBrands.join(' / ')}`,
              `deal_temperature=${dealTemperature === null ? '' : dealTemperature}`,
              `very_hot=${isVeryHotDeal}`,
              '',
            ].join('\n')
          );

          console.log(`Produit : ${title}`);
          console.log(`Réduction : ${discount === null ? 'introuvable' : discount.toFixed(2) + ' %'}`);
          console.log(`Article intéressant : ${isInteresting ? 'oui' : 'non'}`);
          console.log(`Température Dealabs : ${dealTemperature === null ? 'non transmise' : dealTemperature + '°'}`);

          if (matchedCategories.length > 0) {
            console.log(`Catégorie détectée : ${matchedCategories.join(' / ')}`);
          }

          if (matchedBrands.length > 0) {
            console.log(`Marque populaire détectée : ${matchedBrands.join(' / ')}`);
          }

          if (eligible) {
            console.log(`✅ Vidéo autorisée : ${reason}.`);
          } else {
            console.log(`⏭️ Vidéo ignorée : ${reason}.`);
          }
          NODE

      - name: Préparer l'image produit
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          rm -f public/product-image.jpg public/product-image.svg

          IMAGE_OK=false

          if [ -n "${IMAGE_URL:-}" ]; then
            if curl \
              --location \
              --fail \
              --silent \
              --show-error \
              --max-time 25 \
              --retry 2 \
              --user-agent "Mozilla/5.0" \
              --referer "https://www.amazon.fr/" \
              --output public/product-image.jpg \
              "$IMAGE_URL"; then

              MIME_TYPE="$(file --brief --mime-type public/product-image.jpg || true)"
              if [[ "$MIME_TYPE" == image/* ]] && [ -s public/product-image.jpg ]; then
                IMAGE_OK=true
              fi
            fi
          fi

          if [ "$IMAGE_OK" != true ]; then
            rm -f public/product-image.jpg
            cat > public/product-image.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#0b0d12"/>
                <stop offset="1" stop-color="#222936"/>
              </linearGradient>
            </defs>
            <rect width="1080" height="1080" rx="90" fill="url(#bg)"/>
            <circle cx="540" cy="430" r="230" fill="#111722" stroke="#ff9900" stroke-width="18"/>
            <text x="540" y="820" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="72" font-weight="800">BON PLAN AMAZON</text>
            <text x="540" y="910" text-anchor="middle" fill="#ff9900" font-family="Arial" font-size="48" font-weight="700">AlerteBonPlan</text>
          </svg>
          SVG
          fi

      - name: Créer les données du deal
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const localImage = fs.existsSync('public/product-image.jpg')
            ? 'product-image.jpg'
            : 'product-image.svg';

          const props = {
            title: process.env.DEAL_TITLE || 'Bon plan Amazon',
            shortTitle: '',
            currentPrice: process.env.CURRENT_PRICE || '',
            originalPrice: process.env.ORIGINAL_PRICE || '',
            discount: '${{ steps.eligibility.outputs.normalized_discount }}' || process.env.DISCOUNT || '',
            imageUrl: localImage,
            affiliateUrl: process.env.AFFILIATE_URL || '',
            telegramUrl: process.env.TELEGRAM_PUBLIC_URL || '',
          };

          if (!props.affiliateUrl) {
            throw new Error('AFFILIATE_URL est manquant.');
          }

          if (!props.telegramUrl) {
            throw new Error('TELEGRAM_PUBLIC_URL est manquant. Ajoute la variable GitHub correspondante.');
          }

          fs.writeFileSync('props.json', JSON.stringify(props, null, 2));
          console.log(props);
          NODE


      - name: Générer le QR code Telegram
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python generate_qr.py
          test -s public/telegram-qr.png
          ls -lh public/telegram-qr.png

      - name: Générer les 4 voix
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python generate_voice.py

          for AUDIO in \
            public/voice_intro.mp3 \
            public/voice_product.mp3 \
            public/voice_price.mp3 \
            public/voice_final.mp3
          do
            test -s "$AUDIO" || {
              echo "::error::Fichier audio absent : $AUDIO"
              exit 1
            }
          done

          ls -lh public/voice_*.mp3

      - name: Synchroniser les scènes
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail

          INTRO_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_intro.mp3)"
          PRODUCT_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_product.mp3)"
          PRICE_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_price.mp3)"
          FINAL_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_final.mp3)"

          node - "$INTRO_SECONDS" "$PRODUCT_SECONDS" "$PRICE_SECONDS" "$FINAL_SECONDS" <<'NODE'
          const fs = require('fs');

          const fps = 30;
          const paddingSeconds = 0.30;
          const durations = process.argv.slice(2).map(Number);

          if (
            durations.length !== 4 ||
            durations.some((duration) => !Number.isFinite(duration) || duration <= 0)
          ) {
            throw new Error(`Durées audio invalides : ${durations.join(', ')}`);
          }

          const frames = durations.map((duration) =>
            Math.ceil((duration + paddingSeconds) * fps)
          );

          const [intro, product, price, finalScene] = frames;

          const content = [
            `export const FPS = ${fps};`,
            '',
            `export const INTRO_FRAMES = ${intro};`,
            `export const PRODUCT_FRAMES = ${product};`,
            `export const PRICE_FRAMES = ${price};`,
            `export const FINAL_FRAMES = ${finalScene};`,
            '',
            'export const INTRO_FROM = 0;',
            'export const PRODUCT_FROM = INTRO_FROM + INTRO_FRAMES;',
            'export const PRICE_FROM = PRODUCT_FROM + PRODUCT_FRAMES;',
            'export const FINAL_FROM = PRICE_FROM + PRICE_FRAMES;',
            '',
            'export const TOTAL_FRAMES = FINAL_FROM + FINAL_FRAMES;',
            '',
          ].join('\n');

          fs.writeFileSync('src/timings.js', content);

          console.log(`Intro : ${durations[0].toFixed(2)} s -> ${intro} frames`);
          console.log(`Produit : ${durations[1].toFixed(2)} s -> ${product} frames`);
          console.log(`Prix : ${durations[2].toFixed(2)} s -> ${price} frames`);
          console.log(`Final : ${durations[3].toFixed(2)} s -> ${finalScene} frames`);
          console.log(`Total : ${frames.reduce((sum, value) => sum + value, 0)} frames`);
          NODE

          cat src/timings.js

      - name: Générer la légende TikTok
        if: steps.eligibility.outputs.eligible == 'true'
        run: python generate_caption.py

      - name: Générer la vidéo
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npx remotion render \
            src/index.jsx \
            DealVideo \
            video_tiktok.mp4 \
            --props=props.json \
            --codec=h264 \
            --crf=16

      - name: Vérifier la vidéo
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -s video_tiktok.mp4
          test -s tiktok_caption.txt
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1 video_tiktok.mp4

      - name: Envoyer la vidéo dans Telegram
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendVideo" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "video=@video_tiktok.mp4" \
            --form "supports_streaming=true" \
            --form-string "caption=🎬 Vidéo TikTok prête — la légende arrive dans le message suivant."

      - name: Envoyer la légende
        if: steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CAPTION="$(cat tiktok_caption.txt)"

          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "disable_web_page_preview=true" \
            --form-string "text=${CAPTION}"
