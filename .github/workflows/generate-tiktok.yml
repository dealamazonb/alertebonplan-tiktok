name: Generate TikTok Video

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Nom exact du produit"
        required: true
      current_price:
        description: "Prix actuel"
        required: false
      original_price:
        description: "Ancien prix"
        required: false
      discount:
        description: "Réduction"
        required: false
      image_url:
        description: "URL de l'image produit"
        required: false
      affiliate_url:
        description: "Lien affilié Amazon"
        required: true

  repository_dispatch:
    types:
      - generate_tiktok

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DEAL_TITLE: ${{ github.event.client_payload.title || inputs.title }}
      CURRENT_PRICE: ${{ github.event.client_payload.currentPrice || inputs.current_price }}
      ORIGINAL_PRICE: ${{ github.event.client_payload.originalPrice || inputs.original_price }}
      DISCOUNT: ${{ github.event.client_payload.discount || inputs.discount }}
      IMAGE_URL: ${{ github.event.client_payload.imageUrl || inputs.image_url }}
      AFFILIATE_URL: ${{ github.event.client_payload.affiliateUrl || inputs.affiliate_url }}
      TTS_VOICE: fr-FR-HenriNeural
      TTS_RATE: "-5%"
      TTS_PITCH: "-2Hz"

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Node
        run: npm install --no-audit --no-fund

      - name: Installer la voix française
        run: python -m pip install --upgrade pip edge-tts==7.2.8

      - name: Préparer une image locale fiable
        shell: bash
        run: |
          set -u
          mkdir -p public
          rm -f public/product-image.jpg public/product-image.svg

          IMAGE_OK=false

          if [ -n "${IMAGE_URL:-}" ]; then
            echo "Tentative de téléchargement de l'image produit..."

            if curl \
              --location \
              --fail \
              --silent \
              --show-error \
              --max-time 25 \
              --retry 2 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36" \
              --referer "https://www.amazon.fr/" \
              --output public/product-image.jpg \
              "$IMAGE_URL"; then

              MIME_TYPE="$(file --brief --mime-type public/product-image.jpg || true)"
              echo "Type détecté : ${MIME_TYPE}"

              if [[ "$MIME_TYPE" == image/* ]] && [ -s public/product-image.jpg ]; then
                IMAGE_OK=true
              fi
            fi
          fi

          if [ "$IMAGE_OK" != true ]; then
            echo "Image distante inutilisable : création de l'image de secours."
            rm -f public/product-image.jpg

            cat > public/product-image.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#0b0d12"/>
                <stop offset="1" stop-color="#222936"/>
              </linearGradient>
              <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ff9900"/>
                <stop offset="1" stop-color="#ffcc33"/>
              </linearGradient>
            </defs>
            <rect width="1080" height="1080" rx="90" fill="url(#bg)"/>
            <circle cx="540" cy="430" r="230" fill="#111722" stroke="#ff9900" stroke-width="18"/>
            <path d="M390 430h300l-35 210H425z" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linejoin="round"/>
            <circle cx="470" cy="690" r="30" fill="#ff9900"/>
            <circle cx="620" cy="690" r="30" fill="#ff9900"/>
            <text x="540" y="850" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="800">BON PLAN AMAZON</text>
            <text x="540" y="930" text-anchor="middle" fill="#ff9900" font-family="Arial, sans-serif" font-size="48" font-weight="700">AlerteBonPlan</text>
          </svg>
          SVG
          fi

          ls -lh public/product-image.*

      - name: Créer les données du deal
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const localImage = fs.existsSync('public/product-image.jpg')
            ? 'product-image.jpg'
            : 'product-image.svg';

          const props = {
            title: process.env.DEAL_TITLE || 'Bon plan Amazon',
            currentPrice: process.env.CURRENT_PRICE || '',
            originalPrice: process.env.ORIGINAL_PRICE || '',
            discount: process.env.DISCOUNT || '',
            imageUrl: localImage,
            affiliateUrl: process.env.AFFILIATE_URL || ''
          };

          if (!props.affiliateUrl) {
            throw new Error('AFFILIATE_URL est manquant.');
          }

          fs.writeFileSync('props.json', JSON.stringify(props, null, 2));
          console.log('Données du deal préparées :', props);
          NODE

      - name: Générer la voix française
        run: python generate_voice.py

      - name: Adapter automatiquement la durée de la vidéo à la voix
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

          AUDIO_SECONDS="$(ffprobe \
            -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            public/voice.mp3)"

          node - "$AUDIO_SECONDS" <<'NODE'
          const fs = require('fs');

          const audioSeconds = Number(process.argv[2]);
          const fps = 30;

          if (!Number.isFinite(audioSeconds) || audioSeconds <= 0) {
            throw new Error(`Durée audio invalide : ${process.argv[2]}`);
          }

          // Petite marge pour éviter de couper la dernière syllabe.
          const endPaddingSeconds = 0.75;

          // Garde-fous contre un fichier audio anormal.
          const minimumSeconds = 6;
          const maximumSeconds = 30;

          const videoSeconds = Math.min(
            maximumSeconds,
            Math.max(minimumSeconds, audioSeconds + endPaddingSeconds)
          );

          const durationInFrames = Math.ceil(videoSeconds * fps);
          const rootPath = 'src/Root.jsx';

          let root = fs.readFileSync(rootPath, 'utf8');

          if (!/durationInFrames=\{\d+\}/.test(root)) {
            throw new Error(
              'Impossible de trouver durationInFrames={nombre} dans src/Root.jsx'
            );
          }

          root = root.replace(
            /durationInFrames=\{\d+\}/,
            `durationInFrames={${durationInFrames}}`
          );

          fs.writeFileSync(rootPath, root);

          console.log(`Durée de la voix : ${audioSeconds.toFixed(3)} s`);
          console.log(`Marge de fin : ${endPaddingSeconds.toFixed(2)} s`);
          console.log(`Durée finale : ${videoSeconds.toFixed(3)} s`);
          console.log(`Durée Remotion : ${durationInFrames} frames à ${fps} FPS`);
          NODE

          grep "durationInFrames" src/Root.jsx

      - name: Générer la légende TikTok
        run: python generate_caption.py

      - name: Générer la vidéo avec Remotion
        run: |
          npx remotion render \
            src/index.jsx \
            DealVideo \
            video_tiktok.mp4 \
            --props=props.json \
            --codec=h264 \
            --crf=16

      - name: Vérifier les fichiers
        run: |
          test -s video_tiktok.mp4
          test -s public/voice.mp3
          test -s tiktok_caption.txt
          ls -lh video_tiktok.mp4 public/voice.mp3 tiktok_caption.txt

      - name: Envoyer la vidéo dans Telegram
        shell: bash
        run: |
          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendVideo" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "video=@video_tiktok.mp4" \
            --form "supports_streaming=true" \
            --form-string "caption=🎬 Vidéo TikTok prête — la légende arrive dans le message suivant."

      - name: Envoyer la légende prête à copier
        shell: bash
        run: |
          CAPTION="$(cat tiktok_caption.txt)"

          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "disable_web_page_preview=true" \
            --form-string "text=${CAPTION}"
