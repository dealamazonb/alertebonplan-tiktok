name: Generate TikTok Video V16

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Nom exact du produit"
        required: true
      current_price:
        description: "Prix actuel"
        required: false
      original_price:
        description: "Ancien prix"
        required: false
      discount:
        description: "Réduction"
        required: false
      image_url:
        description: "URL de l'image produit"
        required: false
      affiliate_url:
        description: "Lien affilié Amazon"
        required: true

  repository_dispatch:
    types:
      - generate_tiktok

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DEAL_TITLE: ${{ github.event.client_payload.title || inputs.title }}
      CURRENT_PRICE: ${{ github.event.client_payload.currentPrice || inputs.current_price }}
      ORIGINAL_PRICE: ${{ github.event.client_payload.originalPrice || inputs.original_price }}
      DISCOUNT: ${{ github.event.client_payload.discount || inputs.discount }}
      IMAGE_URL: ${{ github.event.client_payload.imageUrl || inputs.image_url }}
      AFFILIATE_URL: ${{ github.event.client_payload.affiliateUrl || inputs.affiliate_url }}
      TTS_VOICE: fr-FR-HenriNeural
      TTS_RATE: "-5%"
      TTS_PITCH: "-2Hz"

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          python -m pip install --upgrade pip
          python -m pip install edge-tts==7.2.8
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Préparer l'image produit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          rm -f public/product-image.jpg public/product-image.svg

          IMAGE_OK=false

          if [ -n "${IMAGE_URL:-}" ]; then
            if curl \
              --location \
              --fail \
              --silent \
              --show-error \
              --max-time 25 \
              --retry 2 \
              --user-agent "Mozilla/5.0" \
              --referer "https://www.amazon.fr/" \
              --output public/product-image.jpg \
              "$IMAGE_URL"; then

              MIME_TYPE="$(file --brief --mime-type public/product-image.jpg || true)"
              if [[ "$MIME_TYPE" == image/* ]] && [ -s public/product-image.jpg ]; then
                IMAGE_OK=true
              fi
            fi
          fi

          if [ "$IMAGE_OK" != true ]; then
            rm -f public/product-image.jpg
            cat > public/product-image.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#0b0d12"/>
                <stop offset="1" stop-color="#222936"/>
              </linearGradient>
            </defs>
            <rect width="1080" height="1080" rx="90" fill="url(#bg)"/>
            <circle cx="540" cy="430" r="230" fill="#111722" stroke="#ff9900" stroke-width="18"/>
            <text x="540" y="820" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="72" font-weight="800">BON PLAN AMAZON</text>
            <text x="540" y="910" text-anchor="middle" fill="#ff9900" font-family="Arial" font-size="48" font-weight="700">AlerteBonPlan</text>
          </svg>
          SVG
          fi

      - name: Créer les données du deal
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const localImage = fs.existsSync('public/product-image.jpg')
            ? 'product-image.jpg'
            : 'product-image.svg';

          const props = {
            title: process.env.DEAL_TITLE || 'Bon plan Amazon',
            shortTitle: '',
            currentPrice: process.env.CURRENT_PRICE || '',
            originalPrice: process.env.ORIGINAL_PRICE || '',
            discount: process.env.DISCOUNT || '',
            imageUrl: localImage,
            affiliateUrl: process.env.AFFILIATE_URL || '',
          };

          if (!props.affiliateUrl) {
            throw new Error('AFFILIATE_URL est manquant.');
          }

          fs.writeFileSync('props.json', JSON.stringify(props, null, 2));
          console.log(props);
          NODE

      - name: Générer les 4 voix
        shell: bash
        run: |
          set -euo pipefail
          python generate_voice.py

          for AUDIO in \
            public/voice_intro.mp3 \
            public/voice_product.mp3 \
            public/voice_price.mp3 \
            public/voice_final.mp3
          do
            test -s "$AUDIO" || {
              echo "::error::Fichier audio absent : $AUDIO"
              exit 1
            }
          done

          ls -lh public/voice_*.mp3

      - name: Synchroniser les scènes
        shell: bash
        run: |
          set -euo pipefail

          INTRO_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_intro.mp3)"
          PRODUCT_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_product.mp3)"
          PRICE_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_price.mp3)"
          FINAL_SECONDS="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 public/voice_final.mp3)"

          node - "$INTRO_SECONDS" "$PRODUCT_SECONDS" "$PRICE_SECONDS" "$FINAL_SECONDS" <<'NODE'
          const fs = require('fs');

          const fps = 30;
          const paddingSeconds = 0.30;
          const durations = process.argv.slice(2).map(Number);

          if (
            durations.length !== 4 ||
            durations.some((duration) => !Number.isFinite(duration) || duration <= 0)
          ) {
            throw new Error(`Durées audio invalides : ${durations.join(', ')}`);
          }

          const frames = durations.map((duration) =>
            Math.ceil((duration + paddingSeconds) * fps)
          );

          const [intro, product, price, finalScene] = frames;

          const content = [
            `export const FPS = ${fps};`,
            '',
            `export const INTRO_FRAMES = ${intro};`,
            `export const PRODUCT_FRAMES = ${product};`,
            `export const PRICE_FRAMES = ${price};`,
            `export const FINAL_FRAMES = ${finalScene};`,
            '',
            'export const INTRO_FROM = 0;',
            'export const PRODUCT_FROM = INTRO_FROM + INTRO_FRAMES;',
            'export const PRICE_FROM = PRODUCT_FROM + PRODUCT_FRAMES;',
            'export const FINAL_FROM = PRICE_FROM + PRICE_FRAMES;',
            '',
            'export const TOTAL_FRAMES = FINAL_FROM + FINAL_FRAMES;',
            '',
          ].join('\n');

          fs.writeFileSync('src/timings.js', content);

          console.log(`Intro : ${durations[0].toFixed(2)} s -> ${intro} frames`);
          console.log(`Produit : ${durations[1].toFixed(2)} s -> ${product} frames`);
          console.log(`Prix : ${durations[2].toFixed(2)} s -> ${price} frames`);
          console.log(`Final : ${durations[3].toFixed(2)} s -> ${finalScene} frames`);
          console.log(`Total : ${frames.reduce((sum, value) => sum + value, 0)} frames`);
          NODE

          cat src/timings.js

      - name: Générer la légende TikTok
        run: python generate_caption.py

      - name: Générer la vidéo
        shell: bash
        run: |
          set -euo pipefail
          npx remotion render \
            src/index.jsx \
            DealVideo \
            video_tiktok.mp4 \
            --props=props.json \
            --codec=h264 \
            --crf=16

      - name: Vérifier la vidéo
        shell: bash
        run: |
          set -euo pipefail
          test -s video_tiktok.mp4
          test -s tiktok_caption.txt
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1 video_tiktok.mp4

      - name: Envoyer la vidéo dans Telegram
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendVideo" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "video=@video_tiktok.mp4" \
            --form "supports_streaming=true" \
            --form-string "caption=🎬 Vidéo TikTok prête — la légende arrive dans le message suivant."

      - name: Envoyer la légende
        shell: bash
        run: |
          set -euo pipefail
          CAPTION="$(cat tiktok_caption.txt)"

          curl --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --form "chat_id=${{ secrets.TIKTOK_CHANNEL_ID }}" \
            --form "disable_web_page_preview=true" \
            --form-string "text=${CAPTION}"
